<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title description">
  <title id="title">papio acquisition pipeline</title>
  <desc id="description">You or an agent uses the papio CLI or MCP, which submits durable jobs to the policy daemon. The daemon tries automated open-access and licensed API resolvers or hands institutional access to the browser, where a human completes login, MFA, or CAPTCHA. Both paths converge on bounded fetching and PDF validation before an immutable acquisition bundle is previewed, applied, and added to the Zotero library.</desc>
  <defs>
    <marker id="arrow-navy" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2B2D42"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#E85D4A"/>
    </marker>
    <style>
      .type { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
      .node { fill: #2B2D42; }
      .human-node { fill: #E85D4A; }
      .node-label { fill: #F5F1E8; font-size: 17px; font-weight: 650; text-anchor: middle; }
      .flow { fill: none; stroke: #2B2D42; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .human-flow { fill: none; stroke: #E85D4A; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect x="4" y="4" width="1192" height="452" rx="24" fill="#F5F1E8" stroke="#2B2D42" stroke-width="2"/>

  <g class="type">
    <text x="40" y="49" fill="#2B2D42" font-size="23" font-weight="750">Acquisition pipeline</text>
    <g aria-label="Legend">
      <path d="M 827 41 H 857" class="flow" marker-end="url(#arrow-navy)"/>
      <text x="869" y="46" fill="#2B2D42" font-size="15" font-weight="650">Automated</text>
      <path d="M 985 41 H 1015" class="human-flow" marker-end="url(#arrow-coral)"/>
      <text x="1027" y="46" fill="#2B2D42" font-size="15" font-weight="650">Human in the loop</text>
    </g>
    <path d="M 40 70 H 1160" class="flow" opacity="0.18"/>

    <g aria-label="You or an agent">
      <rect class="node" x="30" y="198" width="170" height="72" rx="12"/>
      <text class="node-label" x="115" y="235" dominant-baseline="middle">You or an agent</text>
    </g>
    <g aria-label="papio CLI / MCP">
      <rect class="node" x="226" y="198" width="185" height="72" rx="12"/>
      <text class="node-label" x="318.5" y="235" dominant-baseline="middle">papio CLI / MCP</text>
    </g>
    <g aria-label="Daemon — policy + durable jobs">
      <rect class="node" x="437" y="194" width="235" height="80" rx="12"/>
      <text class="node-label" x="554.5" y="228">
        <tspan x="554.5" y="228">Daemon — policy +</tspan>
        <tspan x="554.5" y="249">durable jobs</tspan>
      </text>
    </g>

    <path d="M 200 234 H 226" class="flow" marker-end="url(#arrow-navy)"/>
    <path d="M 411 234 H 437" class="flow" marker-end="url(#arrow-navy)"/>

    <g aria-label="OA / licensed API resolvers">
      <rect class="node" x="700" y="95" width="175" height="64" rx="12"/>
      <text class="node-label" x="787.5" y="121">
        <tspan x="787.5" y="121">OA / licensed API</tspan>
        <tspan x="787.5" y="142">resolvers</tspan>
      </text>
    </g>
    <path d="M 672 218 H 678 Q 690 218 690 206 V 139 Q 690 127 700 127" class="flow" marker-end="url(#arrow-navy)"/>

    <g aria-label="Institutional OpenURL handoff">
      <rect class="human-node" x="700" y="185" width="175" height="64" rx="12"/>
      <text class="node-label" x="787.5" y="211">
        <tspan x="787.5" y="211">Institutional</tspan>
        <tspan x="787.5" y="232">OpenURL handoff</tspan>
      </text>
    </g>
    <g aria-label="Extension in your browser">
      <rect class="human-node" x="700" y="275" width="175" height="64" rx="12"/>
      <text class="node-label" x="787.5" y="301">
        <tspan x="787.5" y="301">Extension in your</tspan>
        <tspan x="787.5" y="322">browser</tspan>
      </text>
    </g>
    <g aria-label="Human login · MFA · CAPTCHA">
      <rect class="human-node" x="700" y="365" width="175" height="64" rx="12"/>
      <text class="node-label" x="787.5" y="391">
        <tspan x="787.5" y="391">Human login · MFA ·</tspan>
        <tspan x="787.5" y="412">CAPTCHA</tspan>
      </text>
    </g>
    <path d="M 672 250 H 680 Q 690 250 690 240 V 229 Q 690 217 700 217" class="human-flow" marker-end="url(#arrow-coral)"/>
    <path d="M 787.5 249 V 275" class="human-flow" marker-end="url(#arrow-coral)"/>
    <path d="M 787.5 339 V 365" class="human-flow" marker-end="url(#arrow-coral)"/>

    <path d="M 875 127 H 935" class="flow"/>
    <path d="M 875 397 H 907 Q 935 397 935 369 V 127" class="human-flow"/>

    <g aria-label="Bounded fetch + PDF validation">
      <rect class="node" x="955" y="95" width="205" height="64" rx="12"/>
      <text class="node-label" x="1057.5" y="121">
        <tspan x="1057.5" y="121">Bounded fetch + PDF</tspan>
        <tspan x="1057.5" y="142">validation</tspan>
      </text>
    </g>
    <g aria-label="Immutable acquisition bundle">
      <rect class="node" x="955" y="185" width="205" height="64" rx="12"/>
      <text class="node-label" x="1057.5" y="211">
        <tspan x="1057.5" y="211">Immutable acquisition</tspan>
        <tspan x="1057.5" y="232">bundle</tspan>
      </text>
    </g>
    <g aria-label="zotio preview → apply">
      <rect class="node" x="955" y="275" width="205" height="64" rx="12"/>
      <text class="node-label" x="1057.5" y="308" dominant-baseline="middle">zotio preview → apply</text>
    </g>
    <g aria-label="Zotero library">
      <rect class="node" x="955" y="365" width="205" height="64" rx="12"/>
      <text class="node-label" x="1057.5" y="398" dominant-baseline="middle">Zotero library</text>
    </g>

    <path d="M 935 127 H 955" class="flow" marker-end="url(#arrow-navy)"/>
    <path d="M 1057.5 159 V 185" class="flow" marker-end="url(#arrow-navy)"/>
    <path d="M 1057.5 249 V 275" class="flow" marker-end="url(#arrow-navy)"/>
    <path d="M 1057.5 339 V 365" class="flow" marker-end="url(#arrow-navy)"/>
  </g>
</svg>
