name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

# Rapid successive pushes (the normal solo workflow) shouldn't run duplicate
# full suites — newest commit wins.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Check cross-artifact compatibility
        run: python3 scripts/release_metadata.py compat --repo-root . --skip-zotio

  # Fail CI if go.mod/go.sum drift from source.
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
      - name: Check module drift
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Verify modules
        run: go mod verify

  # Generated command reference (docs/reference/commands.md) must match the
  # binary. Mirrors the module drift gate above: regenerate and fail if it moved.
  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
      - name: Regenerate command reference
        run: go run ./cmd/docs-gen
      - name: Check for drift
        run: git diff --exit-code docs/reference/commands.md

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
      - name: Check Formatting
        run: test -z "$(gofmt -l .)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: betterleaks
        run: |
          set -euo pipefail
          BL_VERSION=1.6.1
          BL_SHA256=fbefc700a0bd4522cc952dd2a8f259cdb80526d7e60114aca19bb2d6fdc80f81
          TMP="$(mktemp -d)"
          curl -sSL "https://github.com/betterleaks/betterleaks/releases/download/v${BL_VERSION}/betterleaks_${BL_VERSION}_linux_x64.tar.gz" -o "$TMP/bl.tar.gz"
          echo "${BL_SHA256}  $TMP/bl.tar.gz" | sha256sum -c -
          tar -xzf "$TMP/bl.tar.gz" -C "$TMP" betterleaks
          "$TMP/betterleaks" git . --no-banner --redact

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
      - name: Build
        run: go build ./...
      - name: Test
        # Race detector on the fast runner only: the daemon and browser bridge
        # are concurrent, and the plain suite structurally cannot see races.
        run: go test ${RACE:+"$RACE"} ./...
        env:
          RACE: ${{ matrix.os == 'ubuntu-latest' && '-race' || '' }}

  # Platform-specific files (named-pipe IPC, registry native host, flock vs
  # LockFileEx) are never compiled on the ubuntu test runner. Cross-compile and
  # vet every target so a Windows- or macOS-only break fails CI, not a release.
  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
      - name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
        run: go build ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Vet (${{ matrix.goos }}/${{ matrix.goarch }})
        run: go vet ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

  # Browser-plane MV3 extension: TypeScript typecheck + bun tests.
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
      - name: Build bundles and lint Firefox
        run: bun run lint:firefox
