<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>papio — inbox</title>
    <style>
      :root {
        color-scheme: light dark;
        --color-ink: #182231;
        --color-brand-ink: #2b2d42;
        --color-brand-accent: #d94f3d;
        --color-muted: #607080;
        --color-context: #426789;
        --color-border: #dce3ea;
        --color-control-border: #b8c5d1;
        --color-page: #f4f7f9;
        --color-surface: #fdfefe;
        --color-surface-hover: #eef3f6;
        --color-primary: #12549b;
        --color-primary-border: #8db9eb;
        --color-primary-surface: #eaf3ff;
        --color-primary-hover: #dcecff;
        --color-warning: #6d4316;
        --color-warning-border: #a15c17;
        --color-warning-surface: #fff7ed;
        --color-ok: #245e45;
        --color-ok-border: #78aa8f;
        --color-ok-surface: #edf7f1;
        --color-overlay: rgb(24 34 49 / 56%);
        --shadow-dialog: 0 24px 64px rgb(24 34 49 / 20%);
        --font-size-label: 11px;
        --font-size-small: 12px;
        --font-size-body: 14px;
        --font-size-title: 22px;
        --font-size-item-title: 16px;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-6: 24px;
        --space-8: 32px;
        --space-12: 48px;
        --radius-control: 6px;
        --radius-card: 8px;
        --control-height: 36px;
        --brand-mark-size: 32px;
        --focus-width: 3px;
        --focus-offset: 3px;
        --page-max-width: 72rem;
        --dialog-max-width: 32rem;
        --transition-fast: 140ms ease-out;
        accent-color: var(--color-primary);
        color: var(--color-ink);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-ink: #e5edf4;
          --color-brand-ink: #f0edf3;
          --color-brand-accent: #ef6a57;
          --color-muted: #a2b1be;
          --color-context: #aecbe4;
          --color-border: #344353;
          --color-control-border: #526579;
          --color-page: #141b23;
          --color-surface: #1c2631;
          --color-surface-hover: #263340;
          --color-primary: #a8d0ff;
          --color-primary-border: #4f85bc;
          --color-primary-surface: #183956;
          --color-primary-hover: #214967;
          --color-warning: #f1c183;
          --color-warning-border: #b97833;
          --color-warning-surface: #33291e;
          --color-ok: #b3ddc2;
          --color-ok-border: #568f6d;
          --color-ok-surface: #1d3329;
          --color-overlay: rgb(4 9 15 / 72%);
          --shadow-dialog: 0 24px 64px rgb(0 0 0 / 42%);
        }
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html {
        min-height: 100%;
      }

      body {
        background: var(--color-page);
        color: var(--color-ink);
        font-size: var(--font-size-body);
        line-height: 1.5;
        margin: 0 auto;
        max-width: var(--page-max-width);
        min-height: 100vh;
        padding: var(--space-8) var(--space-6) var(--space-12);
      }

      header {
        border-bottom: 1px solid var(--color-border);
        display: grid;
        gap: var(--space-3);
        padding-bottom: var(--space-6);
      }

      h1,
      h2,
      h3,
      p,
      dl {
        margin: 0;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: var(--space-3);
        margin-bottom: var(--space-1);
      }

      .brand svg {
        flex: 0 0 auto;
        height: var(--brand-mark-size);
        width: var(--brand-mark-size);
      }

      .brand-name {
        color: var(--color-brand-ink);
        font-size: var(--font-size-title);
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1.2;
      }

      .page-name {
        color: var(--color-muted);
        font-weight: 500;
      }

      #connection-status {
        background: var(--color-surface);
        border-left: var(--space-1) solid var(--color-border);
        border-radius: 0 var(--radius-control) var(--radius-control) 0;
        color: var(--color-muted);
        font-size: var(--font-size-small);
        padding: var(--space-2) var(--space-3);
      }

      #connection-status[data-state="connected"] {
        background: var(--color-ok-surface);
        border-left-color: var(--color-ok-border);
        color: var(--color-ok);
      }

      #connection-status[data-state="disconnected"] {
        background: var(--color-warning-surface);
        border-left-color: var(--color-warning-border);
        color: var(--color-warning);
        font-weight: 600;
      }

      #inbox-counts {
        color: var(--color-muted);
        font-size: var(--font-size-small);
        font-variant-numeric: tabular-nums;
      }

      .toolbar,
      .item-controls {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
      }

      #shortcut-help {
        color: var(--color-muted);
        font-size: var(--font-size-label);
      }

      #shortcut-help strong {
        color: var(--color-context);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      button {
        appearance: none;
        background: var(--color-surface);
        border: 1px solid var(--color-control-border);
        border-radius: var(--radius-control);
        color: var(--color-ink);
        cursor: pointer;
        font: inherit;
        font-size: var(--font-size-small);
        min-height: var(--control-height);
        padding: var(--space-1) var(--space-3);
        transition:
          background-color var(--transition-fast),
          border-color var(--transition-fast),
          color var(--transition-fast);
      }

      button:hover:not(:disabled) {
        background: var(--color-surface-hover);
      }

      button:focus-visible,
      a:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      [data-operation="acquire"],
      [data-operation="accept"],
      #confirm-submit {
        background: var(--color-primary-surface);
        border-color: var(--color-primary-border);
        color: var(--color-primary);
        font-weight: 600;
      }

      [data-operation="acquire"]:hover:not(:disabled),
      [data-operation="accept"]:hover:not(:disabled),
      #confirm-submit:hover:not(:disabled) {
        background: var(--color-primary-hover);
      }

      a {
        color: var(--color-primary);
        text-decoration-thickness: 1px;
        text-underline-offset: var(--space-1);
      }

      a:hover {
        color: var(--color-context);
      }

      #item-list {
        margin-top: var(--space-8);
      }

      .triage-group {
        display: grid;
        gap: var(--space-3);
        margin-bottom: var(--space-8);
      }

      .triage-group > h2 {
        color: var(--color-muted);
        font-size: var(--font-size-small);
        font-weight: 700;
        letter-spacing: 0.07em;
        padding-left: var(--space-1);
        text-transform: uppercase;
      }

      .triage-item {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        display: grid;
        gap: var(--space-3);
        min-width: 0;
        padding: var(--space-4);
        transition:
          background-color var(--transition-fast),
          border-color var(--transition-fast);
      }

      .triage-item:hover {
        border-color: var(--color-control-border);
      }

      .triage-item:focus {
        background: var(--color-primary-surface);
        border-color: var(--color-primary-border);
        outline: var(--focus-width) solid var(--color-primary);
        outline-offset: var(--focus-offset);
      }

      .triage-item h3 {
        color: var(--color-ink);
        font-size: var(--font-size-item-title);
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .item-facts {
        display: grid;
        gap: var(--space-1) var(--space-3);
        grid-template-columns: minmax(6rem, max-content) minmax(0, 1fr);
      }

      .item-facts dt {
        color: var(--color-muted);
        font-size: var(--font-size-label);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .item-facts dd {
        color: var(--color-context);
        margin: 0;
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .item-links {
        font-size: var(--font-size-small);
        overflow-wrap: anywhere;
      }

      .item-controls {
        margin-top: var(--space-1);
      }

      .item-result {
        border-left: var(--space-1) solid var(--color-primary-border);
        color: var(--color-context);
        font-size: var(--font-size-small);
        font-weight: 600;
        padding-left: var(--space-2);
      }

      #item-list > p {
        border-bottom: 1px solid var(--color-border);
        border-top: 1px solid var(--color-border);
        color: var(--color-muted);
        padding: var(--space-6) var(--space-1);
      }

      #operation-status {
        color: var(--color-context);
        font-size: var(--font-size-small);
        margin: var(--space-4) 0;
      }

      #operation-status:empty {
        display: none;
      }

      #load-more {
        margin-bottom: var(--space-6);
      }

      footer {
        border-top: 1px solid var(--color-border);
        color: var(--color-muted);
        display: grid;
        font-size: var(--font-size-label);
        gap: var(--space-2);
        padding-top: var(--space-3);
      }

      #generated-at {
        overflow-wrap: anywhere;
      }

      #confirm-dialog {
        background: var(--color-overlay);
        inset: 0;
        padding: var(--space-4);
        place-items: center;
        position: fixed;
        z-index: 1;
      }

      #confirm-dialog:not([hidden]) {
        display: grid;
      }

      #confirm-dialog > section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-dialog);
        color: var(--color-ink);
        display: grid;
        gap: var(--space-4);
        max-width: var(--dialog-max-width);
        padding: var(--space-6);
        width: min(var(--dialog-max-width), calc(100% - (var(--space-4) * 2)));
      }

      #confirm-dialog-title {
        color: var(--color-brand-ink);
        font-size: var(--font-size-item-title);
        line-height: 1.3;
      }

      #confirm-dialog-message {
        color: var(--color-context);
      }

      #confirm-dialog .item-controls {
        justify-content: flex-end;
        margin-top: var(--space-2);
      }

      @media (max-width: 32rem) {
        body {
          padding: var(--space-6) var(--space-4) var(--space-8);
        }

        .item-facts {
          grid-template-columns: 1fr;
        }

        .item-facts dd + dt {
          margin-top: var(--space-2);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1 class="brand">
        <svg viewBox="0 0 512 512" aria-hidden="true">
          <path d="M 95.0 374.6 A 200 200 0 1 1 243.7 455.6" fill="none" stroke="var(--color-brand-ink)" stroke-width="46" stroke-linecap="round"/>
          <g transform="translate(264 244) skewX(-10)">
            <circle cx="0" cy="0" r="68" fill="none" stroke="var(--color-brand-accent)" stroke-width="42"/>
          </g>
          <path d="M 208.0 176.0 L 163.2 430.0" fill="none" stroke="var(--color-brand-accent)" stroke-width="42" stroke-linecap="round"/>
          <path d="M 115.7 416.0 L 215.7 416.0 L 152.6 490.0 Z" fill="var(--color-brand-accent)" stroke="var(--color-brand-accent)" stroke-width="10" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name"><em>papio</em> <span class="page-name">inbox</span></span>
      </h1>
      <p id="connection-status" role="status" aria-live="polite">Connecting to daemon…</p>
      <p id="inbox-counts">Counts unavailable</p>
      <div class="toolbar" aria-label="Inbox controls">
        <button id="refresh-inbox" type="button">Refresh</button>
        <button id="reconnect-daemon" type="button" hidden>Reconnect</button>
      </div>
      <p id="shortcut-help"><strong>Shortcuts:</strong> j/k move, a primary action, d dismiss, o open first link. Shortcuts pause while typing or confirming.</p>
    </header>
    <main id="item-list" aria-label="Triage items"></main>
    <p id="operation-status" role="status" aria-live="polite"></p>
    <button id="load-more" type="button" hidden>Load more</button>
    <footer>
      <time id="generated-at">generated at —</time>
    </footer>
    <div id="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-dialog-title" aria-describedby="confirm-dialog-message" hidden>
      <section>
        <h2 id="confirm-dialog-title">Confirm change</h2>
        <p id="confirm-dialog-message"></p>
        <div class="item-controls">
          <button id="confirm-cancel" type="button">Cancel</button>
          <button id="confirm-submit" type="button">Confirm</button>
        </div>
      </section>
    </div>
    <script src="./inbox.js" type="module"></script>
  </body>
</html>
