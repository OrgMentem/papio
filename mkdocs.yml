# Documentation site config. Consumed natively by Zensical (`zensical build`)
# and, unchanged, by Material for MkDocs (`mkdocs build`) as a fallback while
# Zensical (currently 0.0.x, pre-1.0) matures toward full parity.
#
# Source Markdown lives in docs/. Pages under docs/reference/ are CODE-GENERATED
# by `cmd/docs-gen` (run `go run ./cmd/docs-gen`) — never hand-edit them.
# Everything else in docs/ is authored by hand.

site_name: papio
site_description: A local paper-acquisition broker — searches scholarly works, creates bounded acquisition jobs, validates candidate PDFs, and hands ready artifacts to Zotero through Zotio.
site_author: OrgMentem
copyright: Copyright &copy; 2026 OrgMentem — MIT. papio is an independent project, not affiliated with or endorsed by Zotero.
# Canonical URL (required for the sitemap that instant navigation relies on) + repo links.
site_url: https://orgmentem.github.io/papio/
repo_url: https://github.com/OrgMentem/papio
repo_name: OrgMentem/papio
edit_uri: edit/main/docs/

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  logo: assets/logo-dark.svg
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share

extra:
  # Suppress the "Made with Zensical/Material for MkDocs" footer notice.
  # License-clean (not an attribution requirement); honored by Material,
  # and by Zensical where wired (pre-1.0 — verify on deploy).
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Guide:
      - Getting started: guide/getting-started.md
      - User guide: guide/user-guide.md
      - Use in a coding agent: guide/agent-skill.md
      - Hooks (papis & more): guide/hooks.md
      - Troubleshooting: guide/troubleshooting.md
  - Concepts:
      - Access modes & safety: concepts/access-modes.md
      - Acquisition pipeline: concepts/acquisition-pipeline.md
      - Browser handoff: concepts/browser-handoff.md
      - Provider compatibility: concepts/provider-compatibility.md
      - Validation & provenance: concepts/validation-and-provenance.md
  - Reference:
      - Commands: reference/commands.md
      - MCP tools: reference/mcp-tools.md
      - Configuration: reference/config-reference.md
  - Contributing:
      - Architecture decisions: contributing/architecture-decisions.md
  - Changelog:
      - Daemon & CLI: changelog/daemon.md
      - Browser extension: changelog/extension.md
  - Privacy: privacy.md
